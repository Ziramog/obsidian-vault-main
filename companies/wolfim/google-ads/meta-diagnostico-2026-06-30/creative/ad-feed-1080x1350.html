<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Wolfim Diagnóstico — Feed 1080x1350</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf8;
      --ink: #0A0A0A;
      --muted: #6f6f68;
      --line: #deded8;
      --soft: #f2f2ef;
      --red: #ff3333;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: var(--bg);
    }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      position: relative;
    }
    .grain {
      position: absolute;
      inset: -40%;
      opacity: .035;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 420 420' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 86px 86px 78px;
      display: flex;
      flex-direction: column;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 92px;
    }
    .logo { width: 250px; height: auto; display: block; }
    .tag {
      font-family: "Space Grotesk", Inter, sans-serif;
      letter-spacing: .13em;
      text-transform: uppercase;
      font-size: 19px;
      font-weight: 700;
      color: var(--muted);
      border: 1.5px solid var(--line);
      padding: 14px 19px 12px;
      background: rgba(255,255,255,.32);
    }
    h1 {
      font-family: "Space Grotesk", Inter, sans-serif;
      font-size: 88px;
      line-height: .97;
      letter-spacing: -0.058em;
      margin: 0 0 48px;
      font-weight: 700;
      max-width: 920px;
    }
    .lead {
      font-size: 31px;
      line-height: 1.34;
      color: var(--muted);
      max-width: 810px;
      margin: 0 0 54px;
      letter-spacing: -0.018em;
    }
    .checklist {
      border: 1.6px solid var(--line);
      background: rgba(255,255,255,.45);
      padding: 36px 40px;
      display: grid;
      gap: 28px;
      margin-bottom: 52px;
      box-shadow: 0 24px 70px rgba(10,10,10,.045);
    }
    .item {
      display: flex;
      align-items: center;
      gap: 23px;
      font-size: 31px;
      font-weight: 600;
      line-height: 1.12;
      letter-spacing: -0.025em;
    }
    .box {
      width: 34px;
      height: 34px;
      border: 3px solid var(--ink);
      flex: 0 0 auto;
      position: relative;
    }
    .box::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      right: -6px;
      top: -6px;
      background: var(--red);
    }
    .bottom {
      margin-top: 0;
      display: flex;
      align-items: center;
      gap: 34px;
    }
    .cta {
      background: var(--ink);
      color: #fff;
      font-family: "Space Grotesk", Inter, sans-serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.015em;
      padding: 28px 42px 30px;
      min-width: 390px;
      text-align: center;
      box-shadow: 0 20px 42px rgba(10,10,10,.13);
    }
    .url {
      font-size: 24px;
      color: var(--muted);
      line-height: 1.25;
      letter-spacing: -0.01em;
    }
    .rule {
      position: absolute;
      left: 86px;
      right: 86px;
      bottom: 62px;
      height: 1.5px;
      background: var(--line);
      opacity: .65;
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <main class="wrap">
    <section class="top">
      <img class="logo" src="logo_wolfim_57UD10.svg" alt="Wolfim / 57UD10">
      <div class="tag">Diagnóstico gratis</div>
    </section>

    <h1>Tu web tiene<br>3 errores que<br>frenan consultas</h1>

    <p class="lead">Te digo cuáles tiene la tuya. Sin cargo. En 24 horas.</p>

    <section class="checklist" aria-label="Errores comunes en sitios web">
      <div class="item"><span class="box"></span><span>WhatsApp difícil de encontrar</span></div>
      <div class="item"><span class="box"></span><span>Carga lenta en celular</span></div>
      <div class="item"><span class="box"></span><span>No transmite confianza</span></div>
    </section>

    <section class="bottom">
      <div class="cta">Pedilo sin cargo</div>
      <div class="url">wolfim.com<br>/diagnostico</div>
    </section>
    <div class="rule"></div>
  </main>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <title>Wolfim Diagnóstico — Stories 1080x1920</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf8;
      --ink: #0A0A0A;
      --muted: #6f6f68;
      --line: #deded8;
      --red: #ff3333;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: var(--bg);
    }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      position: relative;
    }
    .grain {
      position: absolute;
      inset: -40%;
      opacity: .035;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 420 420' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 122px 86px 120px;
      display: flex;
      flex-direction: column;
    }
    .logo { width: 268px; height: auto; display: block; margin-bottom: 142px; }
    .tag {
      width: fit-content;
      font-family: "Space Grotesk", Inter, sans-serif;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
      border: 1.5px solid var(--line);
      padding: 16px 21px 14px;
      background: rgba(255,255,255,.35);
      margin-bottom: 48px;
    }
    h1 {
      font-family: "Space Grotesk", Inter, sans-serif;
      font-size: 106px;
      line-height: .96;
      letter-spacing: -0.06em;
      margin: 0 0 60px;
      font-weight: 700;
      max-width: 910px;
    }
    .lead {
      font-size: 38px;
      line-height: 1.3;
      color: var(--muted);
      max-width: 820px;
      margin: 0 0 78px;
      letter-spacing: -0.02em;
    }
    .checklist {
      border: 1.6px solid var(--line);
      background: rgba(255,255,255,.48);
      padding: 42px 42px;
      display: grid;
      gap: 34px;
      margin-bottom: 74px;
      box-shadow: 0 24px 70px rgba(10,10,10,.045);
    }
    .item {
      display: flex;
      align-items: center;
      gap: 25px;
      font-size: 36px;
      font-weight: 650;
      line-height: 1.12;
      letter-spacing: -0.028em;
    }
    .box {
      width: 38px;
      height: 38px;
      border: 3px solid var(--ink);
      flex: 0 0 auto;
      position: relative;
    }
    .box::after {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      right: -7px;
      top: -7px;
      background: var(--red);
    }
    .bottom {
      margin-top: auto;
      display: grid;
      gap: 26px;
    }
    .cta {
      background: var(--ink);
      color: #fff;
      font-family: "Space Grotesk", Inter, sans-serif;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -0.018em;
      padding: 34px 44px 37px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 42px rgba(10,10,10,.13);
    }
    .url {
      font-size: 28px;
      color: var(--muted);
      line-height: 1.25;
      letter-spacing: -0.01em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <main class="wrap">
    <img class="logo" src="logo_wolfim_57UD10.svg" alt="Wolfim / 57UD10">
    <div class="tag">Diagnóstico gratis</div>

    <h1>Tu web tiene<br>3 errores que<br>frenan consultas</h1>

    <p class="lead">Te digo cuáles tiene la tuya. Sin cargo. En 24 horas.</p>

    <section class="checklist" aria-label="Errores comunes en sitios web">
      <div class="item"><span class="box"></span><span>WhatsApp difícil de encontrar</span></div>
      <div class="item"><span class="box"></span><span>Carga lenta en celular</span></div>
      <div class="item"><span class="box"></span><span>No transmite confianza</span></div>
    </section>

    <section class="bottom">
      <div class="cta">Pedilo sin cargo</div>
      <div class="url">wolfim.com/diagnostico</div>
    </section>
  </main>
</body>
</html>
